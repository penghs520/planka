server:
  port: 18099

spring:
  application:
    name: kanban-integration-test

  # Nacos 服务发现配置
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:localhost:28848}
        namespace: ${NACOS_NAMESPACE:public}
        # 集成测试不需要注册到 Nacos
        register-enabled: false

# OpenFeign 配置
feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 10000
        loggerLevel: FULL

# 日志配置
logging:
  level:
    cn.agilean.kanban: DEBUG
    org.springframework.cloud.openfeign: DEBUG

# 测试用配置
gateway:
  base-url: http://localhost:18000
