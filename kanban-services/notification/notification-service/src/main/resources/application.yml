server:
  port: 18108

spring:
  application:
    name: notification-service
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:localhost:28848}
        namespace: ${NACOS_NAMESPACE:}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    consumer:
      group-id: notification-service-group
      auto-offset-reset: earliest
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:23306}/${MYSQL_DATABASE:kanban_notification}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# 通知配置
notification:
  builtin:
    enabled: true

# 插件配置
plugin:
  runMode: ${PLUGIN_RUN_MODE:dev}
  pluginPath: ${PLUGIN_PATH:./plugins}
  pluginConfigFilePath: ${PLUGIN_CONFIG_PATH:./plugin-configs}
  enablePluginIdRestartMode: true
  uploadTempPath: ${PLUGIN_UPLOAD_TEMP_PATH:./temp/plugins}

logging:
  level:
    cn.agilean.kanban: DEBUG
