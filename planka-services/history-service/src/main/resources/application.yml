server:
  port: 18105

spring:
  application:
    name: history-service
  # 国际化消息配置
  messages:
    basename: i18n/messages
    encoding: UTF-8
    fallback-to-system-locale: false
  # Nacos 服务注册配置
  cloud:
    nacos:
      discovery:
        server-addr: localhost:28848
        namespace: public
  datasource:
    url: jdbc:mysql://localhost:23306/planka_history?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  # Redis配置
  data:
    redis:
      host: localhost
      port: 26379
      database: 0
      timeout: 3000ms
  kafka:
    bootstrap-servers: localhost:29092
    consumer:
      group-id: history-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: cn.planka.event,cn.planka.event.card

# MyBatis Plus
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: input

# Logging
logging:
  level:
    cn.planka: DEBUG
